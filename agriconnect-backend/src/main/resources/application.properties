spring.application.name=agriconnect-backend
server.port=8081

# Database Configuration (Using MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/agriconnectdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=avie@123

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Debugging logs
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.orm.core=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
agriconnect.app.jwtSecret=agriconnectSecretKeyAgriConnectSecretKeyAgriConnectSecretKey
agriconnect.app.jwtExpirationMs=86400000
